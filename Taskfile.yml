version: 3

interval: 1000ms

tasks:
  lint:
    desc: Lint code
    cmds:
      - cargo clippy --all-targets {{.CLI_ARGS}}
      - cargo fmt --check --all
  lint:fix:
    desc: Lint code and fix problems with autofixes
    cmds:
      - cargo clippy --fix --allow-staged --allow-dirty
      - task: format

  format:
    desc: Format code
    cmds:
      - cargo fmt --all {{.CLI_ARGS}}

  test:
    desc: Run tests
    sources:
      - .cargo/config.toml
      - godot/src/**
      - godot/Cargo.toml
      - lib/**
      - lib/Cargo.toml
      - Cargo.*
      - rust-toolchain.*
    cmds:
      - cargo test {{.CLI_ARGS}}

  link:
    desc: "Link the library to a Godot project: task link -- path-to-godot-project"
    cmd: nu scripts/link.nu {{.CLI_ARGS}}

  run:
    desc: "Run the CLI with a debug build: task run -- <...args>"
    cmds:
      - cargo run {{.CLI_ARGS}}

  build:
    desc: Build debug artifacts
    sources:
      - .cargo/config.toml
      - godot/src/**
      - lib/**
      - Cargo.*
      - ./*/Cargo.toml
      - rust-toolchain.*
    generates:
      - target/debug/**
    cmds:
      - cargo build {{.CLI_ARGS}}

  build:release:
    desc: Build release artifacts
    sources:
      - .cargo/config.toml
      - godot/src/**
      - lib/**
      - Cargo.*
      - ./*/Cargo.toml
      - rust-toolchain.*
    generates:
      - target/release/**
    cmds:
      - cargo build --release --locked {{.CLI_ARGS}}
